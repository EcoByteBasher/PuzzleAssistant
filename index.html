<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puzzle Assistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1 id="app-name">Puzzle Assistant</h1>

    <!-- App version -->
    <div id="app-version" class="app-version"></div>

    <p class="subtitle">Switch between modes to solve anagrams or find words with missing letters.</p>

    <!-- Fancy toggle -->
    <div class="toggle-wrapper">
      <div class="toggle">
        <input type="radio" name="mode" id="anagram" value="anagram" checked>
        <label for="anagram">Anagram</label>
        <input type="radio" name="mode" id="finder" value="finder">
        <label for="finder">Word Finder</label>
        <input type="radio" name="mode" id="wordle" value="wordle">
        <label for="wordle">Wordle</label>
        <div class="slider"></div>
      </div>
    </div>

    <input
      id="letters" type="text" maxlength="15"
      placeholder="Enter letters..."
      aria-label="Input"
      autocomplete="off" autocapitalize="characters" spellcheck="false"
    >
    <div class="chips" id="chips"></div>
    <p id="hint" class="hint"></p>

    <div id="wordlePanel" style="display:none">
        <div id="wordleGrid" class="wordleGrid"></div>
    </div>

    <button id="solve" disabled>Solve</button>

    <div class="results" id="results" aria-live="polite">
      <div class="resultsHeader"><strong>Results</strong> <span id="count">0</span></div>
      <ul id="list"></ul>
    </div>

    <footer id="app-footer" class="app-footer"></footer>
  </main>

  <!-- Dictionaries -->
  <script src="data/dictionarymap.js"></script>
  <script src="data/dictionarylist.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/anagram.js"></script>
  <script src="js/finder.js"></script>
  <script src="js/wordle.js"></script>
  <script src="js/version.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service worker registered"))
        .catch(err => console.error("SW registration failed:", err));
    }
  </script>
</body>
</html>
